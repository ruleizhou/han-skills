# ============================================================
# install.conf — Han skills + MCP 安装配置
# 由 install.sh 在启动时 source。修改本文件来调整各 Agent 的安装行为。
# ============================================================
#
# Skills / MCP 清单不在本文件维护——install.sh 自动发现 ./skills 和 ./mcp。
# 这里只定义「Agent 表」和「MCP 环境变量」（单一真源 + 自动发现理念）。
#
# 每个 Agent 可定义:
#   AGENT_<NAME>_DIR           配置根目录（仅用于状态展示）
#   AGENT_<NAME>_SKILLS_DIR    Skills 安装目录
#   AGENT_<NAME>_SKILLS_FORMAT symlink | mdc | copy | null
#   AGENT_<NAME>_MCP_TYPE      command | json | null（缺省 = 不支持 MCP）
#   AGENT_<NAME>_MCP_FILE      MCP JSON 配置文件（MCP_TYPE=json 时必填）

# --- Claude Code ---
AGENT_CLAUDE_DIR="$HOME/.claude"
AGENT_CLAUDE_SKILLS_DIR="$HOME/.claude/skills"
AGENT_CLAUDE_SKILLS_FORMAT="symlink"
AGENT_CLAUDE_MCP_TYPE="command"

# --- OpenAI Codex ---
# 仅装 skills；codex 的 MCP 配置是 TOML（~/.codex/config.toml），本脚本不支持。
AGENT_CODEX_DIR="$HOME/.codex"
AGENT_CODEX_SKILLS_DIR="$HOME/.codex/skills"
AGENT_CODEX_SKILLS_FORMAT="symlink"

# --- OpenCode ---
AGENT_OPENCODE_DIR="$HOME/.config/opencode"
AGENT_OPENCODE_SKILLS_DIR="$HOME/.config/opencode/skills"
AGENT_OPENCODE_SKILLS_FORMAT="symlink"
AGENT_OPENCODE_MCP_TYPE="json"
AGENT_OPENCODE_MCP_FILE="$HOME/.config/opencode/mcp.json"

# --- Cursor ---
# Skills 用 gen_cursor_rules.py 生成合规 .mdc（带 frontmatter），不是裸 symlink。
AGENT_CURSOR_DIR="$HOME/.cursor"
AGENT_CURSOR_SKILLS_DIR="$HOME/.cursor/rules"
AGENT_CURSOR_SKILLS_FORMAT="mdc"
AGENT_CURSOR_MCP_TYPE="json"
AGENT_CURSOR_MCP_FILE="$HOME/.cursor/mcp.json"

# ============================================================
# MCP 环境变量
# windows-remote 的 SSH 配置（conf 兜底值，可被同名环境变量覆盖）
# ============================================================
WINDOWS_REMOTE_SSH_ALIAS="${WINDOWS_REMOTE_SSH_ALIAS:-winpc}"

# MCP Python 检测（install.sh 注册 MCP 时使用，可选）
# HAN_MCP_PYTHON="/usr/local/meig/python/3.10.15/bin/python3"
# HAN_MCP_PYTHON_SEARCH_DIRS="/opt/python/bin:/other/path"
