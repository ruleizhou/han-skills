name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Cursor rules in sync
        run: python3 scripts/gen_cursor_rules.py --check
      - name: Run validator
        run: python3 scripts/validate.py
